# 將 PWA 建置後部署到 GitHub Pages。
# 必要 Secrets：VITE_GAS_WEBAPP_URL、VITE_API_KEY
# 選用：VITE_API_PROXY_URL（Cloudflare Worker 等）
# Project Pages（user.github.io/RepoName/）會自動設 VITE_BASE=/RepoName/。
# 若網址是 user.github.io（User site 根目錄），請在 Repository variables 設 VITE_BASE=/

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        working-directory: .
        run: |
          npm install
          npm run build
        env:
          VITE_GAS_WEBAPP_URL: ${{ secrets.VITE_GAS_WEBAPP_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_API_PROXY_URL: ${{ secrets.VITE_API_PROXY_URL }}
          # 與 https://<user>.github.io/<repo>/ 路徑一致；User site 根目錄請設 Repository variable VITE_BASE=/
          VITE_BASE: ${{ vars.VITE_BASE || format('/{0}/', github.event.repository.name) }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
